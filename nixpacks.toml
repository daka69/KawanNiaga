providers = ["php", "node"]

[variables]
NIXPACKS_PHP_ROOT_DIR = "/public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.install]
cmds = [
    "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader",
    "npm install"
]

[phases.build]
dependsOn = ["install"]
cmds = [
    "npm run build",
    "php artisan storage:link"
]

[phases.release]
cmds = [
    "php artisan migrate --force"
]
